<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geographic Call Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f8fc;
      color: #1a2a3a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 18px 32px 14px;
      background: #ffffff;
      border-bottom: 1px solid #dde8f0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #1a3a58;
    }
    .header .sub {
      font-size: 11px;
      color: #7a9ab8;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    .kpis { display: flex; gap: 28px; }
    .kpi  { text-align: right; }
    .kpi-v {
      font-size: 28px;
      font-weight: 300;
      color: #1a3a58;
      line-height: 1;
    }
    .kpi-l {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #7a9ab8;
      margin-top: 3px;
    }

    /* ── Map ─────────────────────────────────── */
    #map-wrap {
      position: relative;
      width: 100%;
      height: 590px;
      background: #dce8f4;
      overflow: hidden;
    }
    #map-wrap svg { display: block; position: absolute; top: 0; left: 0; }

    /* ── Map legend ──────────────────────────── */
    .map-legend {
      position: absolute;
      top: 18px; right: 22px;
      background: rgba(255,255,255,0.94);
      border: 1px solid #dde8f0;
      border-radius: 6px;
      padding: 14px 16px;
      min-width: 240px;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      z-index: 10;
    }
    .map-legend h3 {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #7a9ab8;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8f0f8;
    }
    .leg-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-info { flex: 1; min-width: 0; }
    .leg-city { font-size: 12px; color: #1a2a3a; }
    .leg-num  { font-size: 10px; color: #7a9ab8; font-family: monospace; }
    .leg-cnt  { font-size: 11px; color: #5a7a98; text-align: right; }
    .leg-wt   { font-size: 9px; color: #9ab8d0; }

    .origin-hint {
      position: absolute;
      bottom: 16px; left: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.88);
      border: 1px solid #dde8f0;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 10px;
      color: #5a7a98;
      z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .oh-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6a9ab8;
      border: 1px solid #3a6a8a;
      flex-shrink: 0;
    }

    /* ── Stats ───────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid #dde8f0;
      background: #eaf2f8;
      gap: 1px;
    }
    .sp {
      padding: 20px 28px 24px;
      background: #ffffff;
    }
    .sp h2 {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #7a9ab8;
      margin-bottom: 14px;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ab8d0;
      font-weight: 400;
      padding: 0 8px 8px;
      text-align: left;
      border-bottom: 1px solid #e8f0f8;
    }
    td {
      padding: 8px 8px;
      font-size: 13px;
      color: #2a4a62;
      border-bottom: 1px solid #f0f5fa;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-bg { flex: 1; height: 3px; background: #e0eaf4; border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 3px; border-radius: 2px; }
    .pct { font-size: 11px; color: #7a9ab8; width: 36px; text-align: right; flex-shrink: 0; }
    .swatch {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 6px; vertical-align: middle;
    }
    .mono { font-family: monospace; font-size: 11px; color: #7a9ab8; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Geographic Call Map</h1>
    <div class="sub" id="sub">—</div>
  </div>
  <div class="kpis" id="kpis"></div>

<div id="map-wrap">

<div class="stats">

  </div>
  <div class="sp">
    <h2>Calls by Answering Point</h2>
    <table id="t-dest"></table>

</div>

345 6798", "dest_city": "Brisbane", "dlat": -27.4698, "dlon": 153.0251, "color": "#06D6A0", "count": 1}], "origins": [{"state": "NSW", "name": "New South Wales", "lat": -32.1656, "lon": 147.0178, "count": 72}, {"state": "OTHERS", "name": "Other Regions", "lat": -25.2744, "lon": 133.7751, "count": 49}, {"state": "VIC", "name": "Victoria", "lat": -37.0207, "lon": 144.9643, "count": 39}, {"state": "QLD", "name": "Queensland", "lat": -22.5751, "lon": 144.0851, "count": 30}, {"state": "SA", "name": "South Australia", "lat": -30.0002, "lon": 136.2092, "count": 5}, {"state": "TAS", "name": "Tasmania", "lat": -42.0397, "lon": 146.8088, "count": 4}, {"state": "WA", "name": "Western Australia", "lat": -25.3284, "lon": 122.2257, "count": 4}], "destinations": [{"number": "08 9498 1234", "city": "Perth", "lat": -31.9505, "lon": 115.8605, "weight": 0.2, "color": "#FF6B35", "count": 38}, {"number": "07 5645 7312", "city": "Gold Coast", "lat": -28.0167, "lon": 153.4, "weight": 0.15, "color": "#FFD166", "count": 41}, {"number": "07 3345 6798", "city": "Brisbane", "lat": -27.4698, "lon": 153.0251, "weight": 0.1, "color": "#06D6A0", "count": 18}, {"number": "03 9763 1223", "city": "Melbourne", "lat": -37.8136, "lon": 144.9631, "weight": 0.25, "color": "#118AB2", "count": 48}, {"number": "02 9876 1234", "city": "Sydney", "lat": -33.8688, "lon": 151.2093, "weight": 0.3, "color": "#EF476F", "count": 58}], "total": 203};

<script>
(async () => {
  const { flows, origins, destinations, total } = DATA;

  // Slightly deeper colours that read well on a light map
  const colourMap = {
    '#FF6B35': '#d44800',
    '#FFD166': '#b87e00',
    '#06D6A0': '#059a72',
    '#118AB2': '#0a6d92',
    '#EF476F': '#c82050',
  };
  function col(c) { return colourMap[c] || c; }

  // ── Header ──────────────────────────────────────────────────────────
  document.getElementById('sub').textContent =
    total + ' geographic calls  ·  ' + flows.length + ' origin → destination routes';

  document.getElementById('kpis').innerHTML = [
    [total,               'Geographic Calls'],
    [origins.length,      'Origin States'],
    [destinations.length, 'Answering Points'],
    [flows.length,        'Route Pairs'],
  ].map(([v, l]) =>
    '<div class="kpi"><div class="kpi-v">' + v +
    '</div><div class="kpi-l">' + l + '</div></div>'
  ).join('');

  // ── Legend ──────────────────────────────────────────────────────────
  document.getElementById('leg').innerHTML = destinations.map(d =>
    '<div class="leg-row">' +
      '<div class="leg-dot" style="background:' + col(d.color) + '"></div>' +
      '<div class="leg-info">' +
        '<div class="leg-city">' + d.city + '</div>' +
        '<div class="leg-num">' + d.number + '</div>' +
      '</div>' +
      '<div class="leg-cnt">' + d.count + '<br><span class="leg-wt">' +
        (d.weight * 100).toFixed(0) + '% weight</span></div>' +
    '</div>'
  ).join('');

  // ── Tables ──────────────────────────────────────────────────────────
  const maxO = Math.max(...origins.map(o => o.count));
  document.getElementById('t-orig').innerHTML =
    '<tr><th>State / Region</th><th>Calls</th><th style="min-width:130px">Share</th></tr>' +
    origins.map(o => {
      const pct = (o.count / total * 100).toFixed(1);
      return '<tr>' +
        '<td>' + o.name + '</td>' +
        '<td style="font-variant-numeric:tabular-nums">' + o.count + '</td>' +
        '<td><div class="bar-wrap">' +
          '<div class="bar-bg"><div class="bar-fill" style="width:' +
            (o.count / maxO * 100).toFixed(1) + '%;background:#4a8ab0"></div></div>' +
          '<span class="pct">' + pct + '%</span>' +
        '</div></td></tr>';
    }).join('');

  document.getElementById('t-dest').innerHTML =
    '<tr><th>Number</th><th>City</th><th>Calls</th><th style="min-width:130px">Weight</th></tr>' +
    destinations.map(d =>
      '<tr>' +
        '<td class="mono">' + d.number + '</td>' +
        '<td><span class="swatch" style="background:' + col(d.color) + '"></span>' + d.city + '</td>' +
        '<td style="font-variant-numeric:tabular-nums">' + d.count + '</td>' +
        '<td><div class="bar-wrap">' +
          '<div class="bar-bg"><div class="bar-fill" style="width:' +
            (d.weight * 100).toFixed(0) + '%;background:' + col(d.color) + '88"></div></div>' +
          '<span class="pct">' + (d.weight * 100).toFixed(0) + '%</span>' +
        '</div></td></tr>'
    ).join('');

  // ── Map ─────────────────────────────────────────────────────────────
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  const svg = d3.select('#map-wrap').insert('svg', ':first-child')
    .attr('width', W).attr('height', H);

  // Background fill (ocean)
  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#d0e4f2');

  let projection;

  try {
    const world = await d3.json(
      'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'
    );
    const ctries = topojson.feature(world, world.objects.countries);
    const aus = ctries.features.find(f => +f.id === 36);

    projection = d3.geoMercator()
      .fitExtent([[50, 28], [W - 270, H - 28]], aus);

    const gp = d3.geoPath().projection(projection);

    // Graticule
    svg.append('path')
      .datum(d3.geoGraticule()())
      .attr('d', gp)
      .attr('fill', 'none')
      .attr('stroke', '#b8d0e8')
      .attr('stroke-width', 0.4)
      .attr('opacity', 0.6);

    // Countries
    svg.append('g').selectAll('path')
      .data(ctries.features)
      .join('path')
      .attr('d', gp)
      .attr('fill', d => +d.id === 36 ? '#e2eef8' : '#c8dcea')
      .attr('stroke', d => +d.id === 36 ? '#8aaec8' : '#b0cade')
      .attr('stroke-width', d => +d.id === 36 ? 1.0 : 0.3);

  } catch (err) {
    projection = d3.geoMercator()
      .center([133.7, -27.5])
      .scale(W * 0.80)
      .translate([W * 0.44, H * 0.52]);
  }

  const px = (lon, lat) => projection([lon, lat]);

  // Build arc screen-coordinate data
  const arcData = flows.map(f => {
    const [ox, oy] = px(f.olon, f.olat);
    const [dx, dy] = px(f.dlon, f.dlat);
    const mx = (ox + dx) / 2, my = (oy + dy) / 2;
    const dist = Math.hypot(dx - ox, dy - oy) || 1;
    const offset = Math.min(85, dist * 0.28);
    const cx = mx - (dy - oy) / dist * offset;
    const cy = my + (dx - ox) / dist * offset;
    const d = 'M' + ox + ',' + oy + ' Q' + cx + ',' + cy + ' ' + dx + ',' + dy;
    return { ...f, ox, oy, dx, dy, cx, cy, d, c: col(f.color) };
  });

  // Measure path lengths via a hidden SVG element
  const measureSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  measureSvg.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none';
  document.body.appendChild(measureSvg);
  const measurePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  measureSvg.appendChild(measurePath);
  arcData.forEach(a => {
    measurePath.setAttribute('d', a.d);
    a.pathLen = measurePath.getTotalLength();
  });
  document.body.removeChild(measureSvg);

  // ── Faint background arc paths (dashed) ─────────────────────────────
  const arcG = svg.append('g');
  arcData.forEach(a => {
    arcG.append('path')
      .attr('d', a.d)
      .attr('fill', 'none')
      .attr('stroke', a.c)
      .attr('stroke-width', Math.max(0.6, Math.min(2, a.count / 7)))
      .attr('stroke-opacity', 0.22)
      .attr('stroke-dasharray', '5 8');
  });

  // ── Origin nodes ──────────────────────────────────────────────────────
  const maxOC = Math.max(...origins.map(o => o.count));
  const origG = svg.append('g');
  origins.forEach(o => {
    const p = px(o.lon, o.lat);
    if (!p || isNaN(p[0])) return;
    const [x, y] = p;
    const r = 4 + (o.count / maxOC) * 7;

    origG.append('circle')
      .attr('cx', x).attr('cy', y).attr('r', r)
      .attr('fill', 'rgba(90,138,170,0.55)')
      .attr('stroke', '#3a6a8a')
      .attr('stroke-width', 1.2);

    origG.append('text')
      .attr('x', x + r + 4).attr('y', y + 3.5)
      .attr('fill', '#2a5070')
      .attr('font-size', 9).attr('font-family', 'monospace')
      .attr('font-weight', 'bold')
      .text(o.state);
  });

  // ── Destination nodes ─────────────────────────────────────────────────
  const destG = svg.append('g');
  destinations.forEach(d => {
    const p = px(d.lon, d.lat);
    if (!p || isNaN(p[0])) return;
    const [x, y] = p;
    const c = col(d.color);

    // Pulse ring
    const ring = destG.append('circle')
      .attr('cx', x).attr('cy', y)
      .attr('fill', 'none')
      .attr('stroke', c).attr('stroke-width', 1.5)
      .attr('opacity', 0);
    (function pulse() {
      ring.attr('r', 8).attr('opacity', 0.7)
        .transition().duration(2200).ease(d3.easeExpOut)
        .attr('r', 30).attr('opacity', 0)
        .on('end', pulse);
    })();

    // Core dot with white outline for legibility on light bg
    destG.append('circle')
      .attr('cx', x).attr('cy', y).attr('r', 7)
      .attr('fill', 'white')
      .attr('stroke', c).attr('stroke-width', 0);
    destG.append('circle')
      .attr('cx', x).attr('cy', y).attr('r', 5.5)
      .attr('fill', c)
      .attr('stroke', 'white').attr('stroke-width', 1.5);

    // Label
    const east = x > W * 0.55;
    const lx = east ? x - 11 : x + 11;
    const anchor = east ? 'end' : 'start';
    destG.append('text')
      .attr('x', lx).attr('y', y - 9)
      .attr('fill', '#1a2a3a')
      .attr('font-size', 10).attr('font-family', 'monospace')
      .attr('font-weight', 'bold')
      .attr('text-anchor', anchor)
      .text(d.city);
    destG.append('text')
      .attr('x', lx).attr('y', y + 2)
      .attr('fill', '#7a9ab8')
      .attr('font-size', 8.5).attr('font-family', 'monospace')
      .attr('text-anchor', anchor)
      .text(d.number);
  });

  // ── Travelling line-segment animation ────────────────────────────────
  // Each "particle" is a short arc segment using stroke-dashoffset animation.
  // The segment travels from origin to destination at a slow, readable pace.
  const partG = svg.append('g');

  function spawnSegment(arc) {
    const segLen = 52;           // visible segment length in px
    const total  = arc.pathLen;
    const dur    = 3800 + Math.random() * 1600;  // 3.8 – 5.4 s

    // dasharray: [segLen visible] [total+segLen gap] — ensures only one dash visible
    // dashoffset animates 0 → -(total + segLen): moves dash from start to past-end
    const seg = partG.append('path')
      .attr('d', arc.d)
      .attr('fill', 'none')
      .attr('stroke', arc.c)
      .attr('stroke-width', 2.5)
      .attr('stroke-linecap', 'round')
      .attr('stroke-dasharray', segLen + ' ' + (total + segLen))
      .attr('stroke-dashoffset', 0)
      .attr('opacity', 0.9);

    seg.transition()
      .duration(dur)
      .ease(d3.easeLinear)
      .attr('stroke-dashoffset', -(total + segLen))
      .on('end', function() { d3.select(this).remove(); });
  }

  // Stagger initial spawns; rate proportional to call count
  arcData.forEach((arc, i) => {
    const interval = Math.max(1200, Math.round(18000 / arc.count));  // slower cadence
    setTimeout(() => {
      spawnSegment(arc);
      setInterval(() => spawnSegment(arc), interval);
    }, Math.random() * interval + i * 120);
  });

})();
</script>
</body>
